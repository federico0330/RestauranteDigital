version: '3.8'

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Restaurante_P@ssw0rd!
    ports:
      - "1433:1433"

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Server=sql-server;Database=RestauranteDb;User Id=sa;Password=Restaurante_P@ssw0rd!;TrustServerCertificate=True;
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"
    depends_on:
      - sql-server

  frontend:
    image: nginx:alpine
    volumes:
      - ./Frontend:/usr/share/nginx/html
    ports:
      - "8080:80"
    depends_on:
      - api
