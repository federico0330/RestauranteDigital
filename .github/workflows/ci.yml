name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Restaurante.sln

      - name: Build
        run: dotnet build Restaurante.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Tests/Restaurante.Application.Tests/Restaurante.Application.Tests.csproj --configuration Release --no-build --verbosity normal
